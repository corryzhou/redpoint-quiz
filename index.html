<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>人生红点 · 九型测评</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --red: #e63946;
      --red-dark: #c1121f;
      --bg: #0d1117;
      --card: #161b22;
      --card2: #21262d;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #ff6b6b
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px
    }

    .screen {
      width: 100%;
      max-width: 680px;
      display: none;
      animation: fadeIn .4s ease
    }

    .screen.active {
      display: block
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* Landing */
    .logo {
      text-align: center;
      margin-bottom: 32px
    }

    .logo h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--red), #ff9f43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .logo p {
      color: var(--muted);
      margin-top: 8px;
      font-size: .95rem
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: var(--text)
    }

    .tip-list {
      list-style: none;
      color: var(--muted);
      font-size: .88rem;
      line-height: 2
    }

    .tip-list li::before {
      content: "· ";
      color: var(--red)
    }

    .name-input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      margin-top: 20px;
      outline: none;
      transition: .2s
    }

    .name-input:focus {
      border-color: var(--red)
    }

    .name-input::placeholder {
      color: var(--muted)
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 16px;
      font-family: inherit;
      transition: .2s;
      letter-spacing: .5px
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(230, 57, 70, .35)
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none
    }

    .btn.secondary {
      background: var(--card2);
      color: var(--muted);
      font-weight: 400;
      margin-top: 10px
    }

    /* Quiz */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--card2);
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), #ff9f43);
      transition: width .4s ease;
      border-radius: 4px
    }

    .q-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 4px
    }

    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px
    }

    .q-side {
      padding: 20px 22px;
      font-size: .95rem;
      line-height: 1.6
    }

    .q-side.side-a {
      border-bottom: 1px solid var(--border);
      position: relative
    }

    .q-side.side-a::after {
      content: "A";
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: .7rem;
      color: var(--red);
      font-weight: 700;
      background: rgba(230, 57, 70, .15);
      padding: 2px 8px;
      border-radius: 20px
    }

    .q-side.side-b::after {
      content: "B";
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: .7rem;
      color: #4dabf7;
      font-weight: 700;
      background: rgba(77, 171, 247, .1);
      padding: 2px 8px;
      border-radius: 20px
    }

    .q-side.side-b {
      position: relative
    }

    .options {
      padding: 16px 22px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px
    }

    .opt {
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 4px;
      text-align: center;
      cursor: pointer;
      transition: .18s;
      font-size: .7rem;
      color: var(--muted);
      line-height: 1.3
    }

    .opt:hover {
      border-color: var(--muted);
      color: var(--text)
    }

    .opt.sel-a {
      border-color: var(--red);
      background: rgba(230, 57, 70, .12);
      color: var(--red);
      font-weight: 700
    }

    .opt.sel-b {
      border-color: #4dabf7;
      background: rgba(77, 171, 247, .1);
      color: #4dabf7;
      font-weight: 700
    }

    .opt-label {
      display: block;
      font-size: .62rem;
      color: var(--muted);
      margin-top: 3px
    }

    .nav {
      display: flex;
      gap: 10px
    }

    .nav .btn {
      flex: 1;
      margin: 0;
      font-size: .9rem;
      padding: 13px
    }

    /* Results */
    .result-hero {
      text-align: center;
      padding: 32px 0 24px;
      background: linear-gradient(180deg, rgba(230, 57, 70, .08), transparent);
      border-radius: 16px;
      margin-bottom: 24px;
      border: 1px solid rgba(230, 57, 70, .2)
    }

    .result-hero .name-display {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 8px
    }

    .result-hero h2 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--red), #ff9f43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .result-hero .rank-label {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 6px
    }

    .scores-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 24px
    }

    .score-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .score-item.top1 {
      border-color: var(--red);
      background: rgba(230, 57, 70, .08)
    }

    .score-item.top2 {
      border-color: #ffd43b;
      background: rgba(255, 212, 59, .05)
    }

    .score-item .type-name {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 4px
    }

    .score-item .score-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text)
    }

    .score-item.top1 .score-num {
      color: var(--red)
    }

    .score-item.top2 .score-num {
      color: #ffd43b
    }

    .score-item .rank-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: .6rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px
    }

    .top1 .rank-badge {
      background: rgba(230, 57, 70, .2);
      color: var(--red)
    }

    .top2 .rank-badge {
      background: rgba(255, 212, 59, .2);
      color: #ffd43b
    }

    .score-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden
    }

    .score-bar-fill {
      height: 100%;
      background: var(--muted);
      border-radius: 3px
    }

    .top1 .score-bar-fill {
      background: var(--red)
    }

    .top2 .score-bar-fill {
      background: #ffd43b
    }

    /* Type Card */
    .type-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px
    }

    .type-card-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border)
    }

    .type-card-header h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 4px
    }

    .type-card-header .sub {
      font-size: .85rem;
      color: var(--muted)
    }

    .type-card-body {
      padding: 20px 22px
    }

    .motto-list {
      margin-bottom: 16px
    }

    .motto-list h4 {
      font-size: .78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px
    }

    .motto-tag {
      display: inline-block;
      background: rgba(230, 57, 70, .1);
      border: 1px solid rgba(230, 57, 70, .2);
      color: var(--red);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .82rem;
      margin: 3px 3px 3px 0
    }

    .portrait-list {
      margin-bottom: 20px
    }

    .portrait-list h4 {
      font-size: .78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px
    }

    .portrait-item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: .88rem;
      line-height: 1.6;
      color: #cdd9e5
    }

    .portrait-item::before {
      content: "◆";
      color: var(--red);
      flex-shrink: 0;
      margin-top: 3px;
      font-size: .6rem
    }

    .voices-list h4 {
      font-size: .78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px
    }

    .voice {
      background: var(--card2);
      border-left: 3px solid rgba(230, 57, 70, .4);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: .85rem;
      color: #cdd9e5;
      line-height: 1.7;
      font-style: italic
    }

    .sync-msg {
      text-align: center;
      padding: 16px;
      font-size: .82rem;
      color: var(--muted)
    }

    .sync-msg .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.2s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }
  </style>
</head>

<body>

  <!-- Screen 1: Landing -->
  <div class="screen active" id="screen-landing">
    <div class="logo">
      <h1>人生红点</h1>
      <p>九型测评 · 找到你最深的驱动力</p>
    </div>
    <div class="card">
      <h2>答题须知</h2>
      <ul class="tip-list">
        <li>共 <strong>72 道题</strong>，预计 15–20 分钟</li>
        <li>每题左右各是一种人生追求，请选择更吸引你的一边</li>
        <li>遵从第一反应，没有对错之分</li>
        <li>感到纠结时，想象「如果人生只能选一个」</li>
      </ul>
      <input class="name-input" id="nameInput" type="text" placeholder="请先输入你的名字…" maxlength="20">
      <button class="btn" id="startBtn" onclick="startQuiz()" disabled>开始测评 →</button>
    </div>
  </div>

  <!-- Screen 2: Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="q-meta"><span id="qNum"></span><span id="qTotal"></span></div>
    <div class="q-card">
      <div class="q-side side-a" id="textA"></div>
      <div class="q-side side-b" id="textB"></div>
      <div class="options" id="optionsRow"></div>
    </div>
    <div class="nav">
      <button class="btn secondary" onclick="prevQ()">← 上一题</button>
      <button class="btn" id="nextBtn" onclick="nextQ()">下一题 →</button>
    </div>
  </div>

  <!-- Screen 3: Results -->
  <div class="screen" id="screen-result">
    <div class="result-hero">
      <div class="name-display" id="resultName"></div>
      <h2 id="resultTopType"></h2>
      <div class="rank-label" id="resultSubtitle"></div>
    </div>
    <div class="scores-grid" id="scoresGrid"></div>
    <div id="typeCards"></div>
    <div class="sync-msg" id="syncMsg"></div>
    <button class="btn secondary" onclick="restart()">重新开始</button>
  </div>

  <script>
    // ─── DATA ───────────────────────────────────────────────────────────────────

    });
    document.getElementById('nameInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && this.value.trim()) startQuiz();
    });

    function startQuiz() {
      userName = document.getElementById('nameInput').value.trim();
      if (!userName) return;
      currentQ = 0;
      answers = new Array(72).fill(null);
      showScreen('screen-quiz');
      renderQ();
    }

    // ─── QUIZ ────────────────────────────────────────────────────────────────────
    function renderQ() {
      const q = QUESTIONS[currentQ];
      document.getElementById('qNum').textContent = `第 ${currentQ + 1} 题`;
      document.getElementById('qTotal').textContent = `共 72 题`;
      document.getElementById('progressFill').style.width = `${((currentQ + 1) / 72) * 100}%`;
      document.getElementById('textA').textContent = q[2];
      document.getElementById('textB').textContent = q[3];

      const row = document.getElementById('optionsRow');
      row.innerHTML = '';
      OPTIONS.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'opt' + (answers[currentQ] === idx ? ' ' + opt.cls : '');
        btn.innerHTML = `<strong>${opt.label}</strong>`;
        btn.onclick = () => selectOpt(idx);
        row.appendChild(btn);
      });

      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = currentQ === 71 ? '查看结果 →' : '下一题 →';
    }

    function selectOpt(idx) {
      answers[currentQ] = idx;
      renderQ();
    }

    function prevQ() {
      if (currentQ > 0) { currentQ--; renderQ(); }
    }

    function nextQ() {
      if (answers[currentQ] === null) { alert('请选择一个选项'); return; }
      if (currentQ < 71) { currentQ++; renderQ(); }
      else showResult();
    }

    // ─── SCORING ─────────────────────────────────────────────────────────────────
    function calcScores() {
      const scores = new Array(9).fill(0);
      QUESTIONS.forEach((q, i) => {
        if (answers[i] === null) return;
        const opt = OPTIONS[answers[i]];
        scores[q[0]] += opt.scoreA;
        scores[q[1]] += opt.scoreB;
      });
      return scores;
    }

    // ─── RESULTS ─────────────────────────────────────────────────────────────────
    function showResult() {
      const scores = calcScores();
      const indexed = TYPES.map((t, i) => ({ type: t, score: scores[i] })).sort((a, b) => b.score - a.score);
      const top1 = indexed[0];
      const top2 = indexed[1];
      const tied = top1.score === top2.score;

      document.getElementById('resultName').textContent = `${userName} 的人生红点`;
      document.getElementById('resultTopType').textContent = tied ? `${top1.type} / ${top2.type}` : top1.type;
      document.getElementById('resultSubtitle').textContent = tied ? '你有两个同等强烈的驱动力，都是你的第一红点' : `你的第一红点 · 满分 24 分，你得了 ${top1.score} 分`;

      // Scores grid
      const grid = document.getElementById('scoresGrid');
      grid.innerHTML = '';
      indexed.forEach((item, rank) => {
        const div = document.createElement('div');
        div.className = 'score-item' + (rank === 0 ? ' top1' : rank === 1 ? ' top2' : '');
        div.innerHTML = `
      ${rank === 0 ? '<span class="rank-badge">🔴 第一</span>' : ''}
      ${rank === 1 && !tied ? '<span class="rank-badge">第二</span>' : ''}
      <div class="type-name">${item.type}</div>
      <div class="score-num">${item.score}</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:${(item.score / 24) * 100}%"></div></div>`;
        grid.appendChild(div);
      });

      // Type cards
      const cards = document.getElementById('typeCards');
      cards.innerHTML = '';
      const toShow = tied ? [top1.type, top2.type] : [top1.type];
      toShow.forEach(typeName => { cards.appendChild(buildTypeCard(typeName)); });

      showScreen('screen-result');
      submitToSheets(scores, indexed);
    }

    function buildTypeCard(typeName) {
      const d = TYPE_DATA[typeName];
      const card = document.createElement('div');
      card.className = 'type-card';
      card.innerHTML = `
    <div class="type-card-header">
      <h3>${d.icon} ${typeName}</h3>
      <div class="sub">${d.特点}</div>
    </div>
    <div class="type-card-body">
      <div class="motto-list">
        <h4>信奉信条</h4>
        ${d.信条.map(m => `<span class="motto-tag">${m}</span>`).join('')}
      </div>
      <div class="portrait-list">
        <h4>深层画像</h4>
        ${d.画像.map(p => `<div class="portrait-item"><span>${p}</span></div>`).join('')}
      </div>
      <div class="voices-list">
        <h4>真实心声</h4>
        ${d.声音.map(v => `<div class="voice">${v}</div>`).join('')}
      </div>
    </div>`;
      return card;
    }

    // ─── SHEETS SUBMIT ───────────────────────────────────────────────────────────
    function submitToSheets(scores, ranked) {
      if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
      const syncEl = document.getElementById('syncMsg');
      syncEl.innerHTML = '<span class="dot"></span> 正在保存你的结果…';

      const payload = {
        name: userName,
        scores: Object.fromEntries(TYPES.map((t, i) => [t, scores[i]])),
        topType: ranked[0].type,
        secondType: ranked[1].type,
        topScore: ranked[0].score,
        secondScore: ranked[1].score,
        timestamp: new Date().toISOString()
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(() => {
        syncEl.textContent = '✓ 结果已保存';
      }).catch(() => {
        syncEl.textContent = '（离线模式，结果未保存到云端）';
      });
    }

    // ─── UTILS ───────────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function restart() {
      document.getElementById('nameInput').value = '';
      document.getElementById('startBtn').disabled = true;
      showScreen('screen-landing');
    }
  </script>
</body>

</html>
